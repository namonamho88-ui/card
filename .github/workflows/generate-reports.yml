name: Generate Daily AI Reports

on:
  schedule:
    # 매일 자정 KST (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Korean Stock Prices
        run: node scripts/fetch-kr-stocks.js

      - name: Generate Reports
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-daily-reports.js

      - name: Commit and Push Reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reports/
          git diff --cached --quiet || (git commit -m "chore: 자동 생성 AI 리포트 업데이트 $(date +%Y-%m-%d)" && git push)
